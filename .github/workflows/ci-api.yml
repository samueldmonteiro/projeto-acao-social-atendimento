name: CI API

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'api/**'
      - '.github/workflows/ci-api.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'api/**'
      - '.github/workflows/ci-api.yml'

jobs:
  test-api:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: admin_s324
          POSTGRES_PASSWORD: pass1
          POSTGRES_DB: atendimento
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: "postgresql://admin_s324:pass1@localhost:5432/atendimento?schema=public"
      JWT_TOKEN: "4047cc11e1c0559c1410698"

    steps:
      - name: Checkout input
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Run Prisma Generate
        run: npx prisma generate

      - name: Run Linter
        run: pnpm run lint

      - name: Run Tests
        run: pnpm run test
